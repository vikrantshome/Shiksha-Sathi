        body { font-family: 'Geist', sans-serif; }
        .material-symbols-outlined {

<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Section - Predictive Component Implementation -->
<header class="fixed top-0 w-full z-50 bg-[#faf9f5]/80 dark:bg-[#30332f]/80 backdrop-blur-md flex justify-between items-center px-8 py-4 max-w-full">
<div class="flex flex-col">
<h1 class="text-xl font-bold text-primary dark:text-[#f2faff] tracking-tighter font-headline">Shiksha Sathi</h1>
<span class="text-[0.6875rem] uppercase tracking-[0.05em] text-on-surface-variant font-medium">Student Identity Entry</span>
</div>
<!-- Assignment Context Cluster -->
<div class="hidden md:flex items-center space-x-6">
<div class="flex flex-col items-end">
<span class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold">Periodic Table Basics</span>
<div class="flex items-center space-x-2">
<span class="text-sm font-semibold text-primary">Chemistry</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span class="text-sm text-on-surface-variant">20 Marks</span>
</div>
</div>
<div class="h-8 w-[1px] bg-surface-container"></div>
<div class="flex space-x-3">
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors duration-200" data-icon="help_outline">help_outline</button>
</div>
</div>
</header>
<!-- Visual Divider -->
<div class="fixed top-[72px] w-full bg-[#eeeee9] h-[1px] z-40"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<!-- Asymmetric Background Decorative Elements -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[60%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[35%] h-[50%] bg-tertiary-container/20 rounded-full blur-[100px]"></div>
</div>
<!-- Identity Entry Card -->
<div class="relative w-full max-w-lg">
<!-- Subtle Card Backdrop -->
<div class="absolute -inset-1 bg-gradient-to-tr from-primary/5 to-transparent rounded-xl blur-lg opacity-50"></div>
<div class="relative bg-surface-container-lowest border border-outline-variant/10 rounded-xl p-8 md:p-12 shadow-[0px_12px_32px_rgba(48,51,47,0.04)]">
<!-- Editorial Header -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary-container/30 rounded-full mb-6 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 300;">person_edit</span>
</div>
<h2 class="text-2xl font-bold text-on-surface font-headline tracking-tight mb-2">Enter your details to start</h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-xs mx-auto">
                        Please provide your institutional identity to begin the assessment module.
                    </p>
</div>
<!-- Form Section -->
<form class="space-y-8">
<!-- Name Input -->
<div class="group relative">
<label class="block text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors" for="full-name">Full Name</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/20 border-t-0 border-l-0 border-r-0 px-0 py-3 text-on-surface placeholder:text-outline-variant focus:ring-0 focus:border-primary focus:border-b-2 transition-all duration-300 font-body text-base" id="full-name" name="full-name" placeholder="e.g. Julian Barnes" type="text"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-outline-variant text-sm" data-icon="badge">badge</span>
</div>
<!-- Roll Number Input -->
<div class="group relative">
<label class="block text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant mb-2 group-focus-within:text-primary transition-colors" for="roll-number">Roll Number</label>
<input class="w-full bg-surface-container-low border-b border-outline-variant/20 border-t-0 border-l-0 border-r-0 px-0 py-3 text-on-surface placeholder:text-outline-variant focus:ring-0 focus:border-primary focus:border-b-2 transition-all duration-300 font-body text-base" id="roll-number" name="roll-number" placeholder="Enter your unique ID" type="text"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-outline-variant text-sm" data-icon="pin">pin</span>
</div>
<!-- Action Area -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary py-4 px-6 rounded-lg font-bold tracking-wide shadow-md hover:shadow-lg hover:scale-[1.01] active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-2" type="submit">
<span>Start Assignment</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="mt-6 flex items-center justify-center space-x-4 opacity-60">
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-xs" data-icon="schedule">schedule</span>
<span class="text-[0.6875rem] font-medium uppercase tracking-wider">45 Minutes</span>
</div>
<div class="w-1 h-1 rounded-full bg-outline-variant"></div>
<div class="flex items-center space-x-1">
<span class="material-symbols-outlined text-xs" data-icon="layers">layers</span>
<span class="text-[0.6875rem] font-medium uppercase tracking-wider">12 Questions</span>
</div>
</div>
</div>
</form>
</div>
</div>
</main>
<!-- Academic Footer Decoration -->
<footer class="p-8 flex flex-col items-center justify-center space-y-4">
<div class="w-12 h-[2px] bg-primary/20"></div>
<p class="text-[0.6875rem] text-on-surface-variant font-medium tracking-widest uppercase">The Digital Atelier © 2024</p>
</footer>
