spring:
  application:
    name: shikshasathi-backend
  jackson:
    time-zone: Asia/Kolkata
  data:
    mongodb:
      # Reads from environment variable MONGODB_URI
      # Set via: export MONGODB_URI="mongodb+srv://..."
      # Or via .env file in same directory
      uri: ${MONGODB_URI}
server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-key-that-must-be-at-least-256-bits-long-preferably-512-bits-for-security}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

ai-grading:
  enabled: ${AI_GRADING_ENABLED:true}
  provider: ${AI_GRADING_PROVIDER:nvidia}
  api-key: ${NVIDIA_API_KEY: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}
  model: ${AI_GRADING_MODEL:nvidia/nemotron-3-super-120b-a12b}
  endpoint-url: ${AI_GRADING_URL:https://integrate.api.nvidia.com/v1/chat/completions}
  hf-space-url: ${AI_GRADING_HF_URL:https://ainaviksha-naviksha-ai-agent.hf.space/grade}
  timeout-ms: ${AI_GRADING_TIMEOUT_MS:30000}
  temperature: ${AI_GRADING_TEMPERATURE:0.1}
  fallback-to-string-match: ${AI_GRADING_FALLBACK:false}
