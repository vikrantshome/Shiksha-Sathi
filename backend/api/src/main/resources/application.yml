spring:
  application:
    name: shikshasathi-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/shiksha-sathi}
server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-key-that-must-be-at-least-256-bits-long-preferably-512-bits-for-security}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
