spring:
  application:
    name: shikshasathi-backend
  # Enable request logging via filter
  mvc:
    log-request-details: true
  jackson:
    time-zone: Asia/Kolkata
  data:
    mongodb:
      # Reads from environment variable MONGODB_URI
      # Set via: export MONGODB_URI="mongodb+srv://..."
      # Or via .env file in same directory
      uri: ${MONGODB_URI}
server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-key-that-must-be-at-least-256-bits-long-preferably-512-bits-for-security}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

ai-grading:
  enabled: ${AI_GRADING_ENABLED:true}
  provider: ${AI_GRADING_PROVIDER:nvidia}
  api-key: ${NVIDIA_API_KEY}
  model: ${AI_GRADING_MODEL:nvidia/nemotron-3-super-120b-a12b}
  endpoint-url: ${AI_GRADING_URL:https://integrate.api.nvidia.com/v1/chat/completions}
  fallback-url-1: ${AI_GRADING_FALLBACK_URL_1:https://build.nvidia.com/qwen/qwen3.5-122b-a10b}
  fallback-url-2: ${AI_GRADING_FALLBACK_URL_2:https://build.nvidia.com/mistralai/mistral-small-4-119b-2603}
  timeout-ms: ${AI_GRADING_TIMEOUT_MS:30000}
  temperature: ${AI_GRADING_TEMPERATURE:0.1}
  fallback-to-string-match: ${AI_GRADING_FALLBACK:false}

logging:
  level:
    com.shikshasathi: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %X{correlationId:-} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
