spring:
  application:
    name: shikshasathi-backend
  data:
    mongodb:
      # Reads from environment variable MONGODB_URI
      # Set via: export MONGODB_URI="mongodb+srv://..."
      # Or via .env file in same directory
      uri: ${MONGODB_URI}
server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:default-secret-key-that-must-be-at-least-256-bits-long-preferably-512-bits-for-security}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
